version: "3.9"

services:
  db:
    image: postgres:15
    container_name: sohailshop_db
    restart: always
    environment:
      POSTGRES_DB: django_ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sohailshop_network

  web:
    build: .
    container_name: sohailshop_web
    restart: always
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      "
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      - db
    networks:
      - sohailshop_network

volumes:
  postgres_data:

networks:
  sohailshop_network:
