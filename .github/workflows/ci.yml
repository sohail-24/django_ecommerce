name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Commit SHA
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          docker build -t sohail28/django-ecommerce:latest .
          docker push sohail28/django-ecommerce:latest

      - name: Clone Infra Repo
        run: |
    
          git clone https://sohail-24:${{ secrets.INFRA_REPO_TOKEN }}@github.com/sohail-24/django_ecommerce_infra.git infra
          cd infra
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          sed -i "s|image: sohail28/django-ecommerce:.*|image: sohail28/django-ecommerce:${TAG}|g" django.yaml
          git add .
          git commit -m "ci: update image tag to ${TAG}"
          git push
