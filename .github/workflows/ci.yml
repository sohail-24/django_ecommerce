name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Commit SHA
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          docker build -t sohail28/django-ecommerce:${TAG} .
          docker push sohail28/django-ecommerce:${TAG}

      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|sohail28/django-ecommerce:.*|sohail28/django-ecommerce:${TAG}|g" k8s/django.yaml

      - name: Commit Updated Image Tag
        run: |
          git config --global user.name "sohail"
          git config --global user.email "sohailkhan88008@gmail.com"
          git add k8s/django.yaml
          git commit -m "ci: update image tag to ${TAG}" || echo "No changes"
          git push
